version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: vetflow-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://vetflow:${DB_PASSWORD}@postgres:5432/vetflow
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: 3001
    ports:
      - '3001:3001'
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: vetflow-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://api:3001}
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    container_name: vetflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vetflow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: vetflow
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vetflow-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
